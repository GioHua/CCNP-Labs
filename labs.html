  <script>
    fetch("/CCNP-Labs/data/labs.json")
      .then(response => {
        if (!response.ok) throw new Error("File not found");
        return response.json();
      })
      .then(data => {
        document.getElementById("loading-message").remove();
        const list = document.getElementById("pdf-list");
        
        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "project-card";
          
          card.innerHTML = `
            <img src="${item.thumb}" alt="${item.title}" class="thumb" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
            <h2>${item.title}</h2>
            <p><strong>${item.author}</strong></p>
            <p>${item.description}</p>
            ${item.tags ? `<div class="tags">${item.tags.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
          `;

          const link = document.createElement("a");
          link.href = item.file;
          link.target = "_blank";
          link.rel = "noopener";
          link.className = "card-link";
          link.appendChild(card);
          list.appendChild(link);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("loading-message").innerHTML = `
          Failed to load labs.<br>
          <small>Please check that labs.json exists and refresh the page.</small>
        `;
      });
  </script>
